#        shuffle_buffer_size: 1000
        num_workers: 32
#        resolution: 256
#        pin_memory: True
#        persistent_workers: True

    preprocessing:
        max_seq_length: 381 # for text tokens
#        resolution: 256
        center_crop: False
        random_flip: False

optimizer:
    name: adamw
    params: # default adamw params
        learning_rate: 0.0001
        scale_lr: False # scale learning rate by total batch size
        beta1: 0.9
        beta2: 0.999
        weight_decay: 0.01
        epsilon: 1e-8

lr_scheduler:
    scheduler: "cosine"
    params:
        learning_rate: ${optimizer.params.learning_rate}
        warmup_ratio: 0.03

training:
    gradient_accumulation_steps: 1
    noise_type: "mask"
    per_device_batch_size: 200
    mixed_precision: "bf16"
    enable_tf32: True
    seed: 10086
    num_train_epochs: 20
    overfit_one_batch: False
    cond_dropout_prob: 0.1
    min_masking_rate: 0.0
    label_smoothing: 0.0
    max_grad_norm: 1.0
    guidance_scale: 0.0
    generation_timesteps: 12
    t2i_coeff: 1.0
    lm_coeff: 0.1
    mmu_coeff: 1.0
    parallel_decoding: Ture
